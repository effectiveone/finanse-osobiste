title: "Finanse Osobiste"
tagline: "Mądre zarządzanie finansami na co dzień"
description: "Portal o finansach osobistych, budżetowaniu, oszczędzaniu i planowaniu finansowej przyszłości."
url: "https://effectiveone.github.io"
baseurl: "/finanse-osobiste"
lang: pl

theme: jekyll-theme-chirpy

timezone: Europe/Warsaw
paginate: 10

author:
  name: "Redakcja Finanse Osobiste"

theme_mode:
avatar: ""
toc: true

github:
  username: effectiveone

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Redakcja"
      toc: true
      comments: false

collections:
  tabs:
    output: true
    sort_by: order

permalink: /:year/:month/:day/:title/

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - Gemfile.lock
